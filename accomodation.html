<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accommodation - Ayatara Resort TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px; height: 720px;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            position: relative; z-index: 1; padding-top: 50px;
        }

        /* --- BACKGROUND BALI PATTERN --- */
        .bali-bg-layer {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: slowPan 60s linear infinite;
        }
        .bg-gradient-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(5,5,5,0.2) 0%, rgba(5,5,5,0.95) 80%); z-index: -1;
        }
        @keyframes slowPan { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-5%, -5%) rotate(1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }

        /* --- TYPOGRAPHY HEADER --- */
        .header-container { text-align: center; margin-bottom: 30px; }
        .category-title {
            font-size: 18px; color: #d4af37; letter-spacing: 6px; text-transform: uppercase;
            margin-bottom: 10px; opacity: 0; animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
        }
        .main-title {
            font-size: 42px; font-weight: 300; letter-spacing: 2px; opacity: 0;
            animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards;
        }

        /* --- FLEX LAYOUT (TV SAFE) --- */
        .room-grid {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center;
            gap: 30px; 
            width: 1100px; 
            margin: 0 auto; /* Memaksa kotak berada tepat di tengah layar */
            opacity: 0; 
            animation: fadeUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.8s forwards;
        }

        .room-card {
            width: 346px; /* Mengunci lebar secara absolut untuk WebOS */
            height: 200px; 
            position: relative; 
            border-radius: 8px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            border: 2px solid transparent;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, border 0.4s ease;
        }

        .card-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; transition: transform 8s ease-out; 
        }
        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
        }
        .card-content { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; }
        .card-content h2 { font-size: 22px; font-weight: 400; letter-spacing: 1px; color: #fff; }
        
        .view-btn {
            display: inline-block; margin-top: 8px; font-size: 12px; color: #d4af37;
            text-transform: uppercase; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s ease;
        }

        /* --- FOCUSED STATE (GRID) --- */
        .room-card.focused {
            transform: scale(1.06); border: 2px solid #d4af37; box-shadow: 0 20px 50px rgba(212, 175, 55, 0.3); z-index: 10;
        }
        .room-card.focused .card-bg { transform: scale(1.1); }
        .room-card.focused .view-btn { opacity: 1; }

        /* --- POPUP MODAL GALLERY LUXURY WITH DESCRIPTION --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 1280px; height: 720px;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .gallery-container {
            width: 1000px; height: 560px; position: relative; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,1); border: 1px solid rgba(212, 175, 55, 0.3);
            background: #000;
        }

        .gallery-image {
            position: absolute; top: 0; right: 0; width: 100%; height: 100%; object-fit: cover; 
            transition: opacity 0.4s ease; z-index: 1;
        }

        /* Panel Kiri untuk Info Kamar (Floating Gradient) */
        .room-info-panel {
            position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.85) 50%, rgba(0,0,0,0) 100%);
            z-index: 2; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center;
        }

        .modal-title { font-size: 38px; color: #fff; font-weight: 300; letter-spacing: 1px; margin-bottom: 5px; line-height: 1.1; }
        .modal-keywords { font-size: 14px; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; margin-bottom: 25px; }
        .modal-desc { font-size: 18px; color: #e0e0e0; line-height: 1.6; font-weight: 300; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* Badge Informasi di Kanan Atas & Kanan Bawah */
        .gallery-top-right {
            position: absolute; top: 30px; right: 30px; z-index: 3;
            background: rgba(0,0,0,0.7); padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .gallery-counter { font-size: 16px; color: #d4af37; letter-spacing: 2px; font-weight: bold; }

        .gallery-nav-hint {
            position: absolute; bottom: 30px; right: 30px; z-index: 3; text-align: right;
            font-size: 14px; color: #ccc; letter-spacing: 1px; text-transform: uppercase;
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
        }
        .gallery-nav-hint span { color: #d4af37; font-weight: bold; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bali-bg-layer"></div>
    <div class="bg-gradient-overlay"></div>

    <div class="header-container">
        <div class="category-title">Ayatara Accommodation</div>
        <h1 class="main-title">Your Private Sanctuary</h1>
    </div>

    <div class="room-grid" id="room-grid"></div>

    <div class="modal-overlay" id="gallery-modal">
        <div class="gallery-container">
            <img src="" alt="Room View" class="gallery-image" id="modal-image">
            
            <div class="room-info-panel">
                <h2 class="modal-title" id="modal-title">Room Name</h2>
                <div class="modal-keywords" id="modal-keywords">Keywords</div>
                <p class="modal-desc" id="modal-desc">Description goes here.</p>
            </div>

            <div class="gallery-top-right">
                <div class="gallery-counter"><span id="modal-current-idx">1</span> / <span id="modal-total-idx">3</span></div>
            </div>
            <div class="gallery-nav-hint">
                &larr; <span>Geser</span> &rarr; &nbsp;&nbsp;&bull;&nbsp;&nbsp; <span>Kembali / OK</span> Tutup
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // DATA KAMAR & DESKRIPSI
        // ==========================================
        // Nanti ganti link gambar Unsplash di bawah ini dengan link gambar dari GitHub Anda
        const rooms = [
            {
                id: 0, 
                name: "Two Bedroom Pool Villa",
                keywords: "Space – Togetherness – Privacy",
                desc: "Ayatara’s most prestigious accommodation, crafted in a refined high-end resort style for families. Spanning 380 sqm across two levels, it offers an exceptional sense of space and elegance. Each bedroom features an en-suite bathroom with a bathtub. Outdoors, a large private pool and expansive terrace complete this exclusive sanctuary.",
                images: [
                    "https://images.unsplash.com/photo-1582719478250-c894e4dc240e?q=80&w=1000",
                    "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?q=80&w=1000"
                ]
            },
            {
                id: 1, 
                name: "Private Pool Suite",
                keywords: "Sky - Stillness – Freedom",
                desc: "Enjoy your private plunge pool—perfect for a refreshing morning dip or a quiet moment under the sun. Inside, the room is designed with elegant simplicity and soft luxury. A built-in seating area replaces the sunbed, creating a stylish space to relax and unwind.",
                images: [
                    "https://images.unsplash.com/photo-1578683010236-d716f9a3f461?q=80&w=1000",
                    "https://images.unsplash.com/photo-1540518614846-7eded433c457?q=80&w=1000"
                ]
            },
            {
                id: 2, 
                name: "Jacuzzi Valley Suite",
                keywords: "Gentleness - Purification – Passion",
                desc: "A calming retreat with a private jacuzzi and a comfortable day bed, perfect for unwinding in peace. Thoughtfully designed with a private entrance shared between two suites, ensuring both convenience and privacy.",
                images: [
                    "https://images.unsplash.com/photo-1631049307264-da0ec9d70304?q=80&w=1000",
                    "https://images.unsplash.com/photo-1584622781564-1d987f7333c1?q=80&w=1000"
                ]
            },
            {
                id: 3, 
                name: "Honeymoon Pool Villa",
                keywords: "Evergreen – Devotion – Tranquillity",
                desc: "The villa features a spacious private pool and a wide garden, creating a serene and open sanctuary. A spacious bedroom flows seamlessly into a generous living area, complemented by an en-suite bathroom. A private balcony faces directly to the valley with the soothing sound of the flowing river.",
                images: [
                    "https://images.unsplash.com/photo-1618773928121-c32242e63f39?q=80&w=1000",
                    "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?q=80&w=1000"
                ]
            },
            {
                id: 4, 
                name: "Deluxe Valley Suite",
                keywords: "Gentleness - Purification – Passion",
                desc: "Thoughtfully designed for comfort and tranquillity, this room features a private balcony with scenic valley and garden views. Choose between twin or double bedding for a stay tailored to your needs.",
                images: [
                    "https://images.unsplash.com/photo-1598928506311-c55dd1b31bb1?q=80&w=1000",
                    "https://images.unsplash.com/photo-1566665797739-1674de7a421a?q=80&w=1000"
                ]
            },
            {
                id: 5, 
                name: "Deluxe Grande Suite",
                keywords: "Sky - Stillness – Freedom",
                desc: "Offering a higher vantage point, the Deluxe Grande Suite features one of the resort’s best outlooks. The spacious balcony with sun bed provides the perfect place to relax in comfort and privacy.",
                images: [
                    "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1000",
                    "https://images.unsplash.com/photo-1574643033580-c11cc8d4db32?q=80&w=1000"
                ]
            }
        ];

        // ==========================================
        // RENDER KARTU KE GRID HTML
        // ==========================================
        const gridContainer = document.getElementById('room-grid');
        rooms.forEach((room, index) => {
            const isFocused = index === 0 ? 'focused' : '';
            gridContainer.innerHTML += `
                <div class="room-card ${isFocused}" id="card-${index}">
                    <div class="card-bg" style="background-image: url('${room.images[0]}');"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <h2>${room.name}</h2>
                        <span class="view-btn">View Detail & Gallery</span>
                    </div>
                </div>
            `;
        });

        // ==========================================
        // LOGIKA NAVIGASI REMOTE
        // ==========================================
        let currentGridIdx = 0; 
        let isGalleryOpen = false;
        let currentGalleryIdx = 0;
        let activeRoomData = null;

        const modal = document.getElementById('gallery-modal');
        const modalImg = document.getElementById('modal-image');
        const modalTitle = document.getElementById('modal-title');
        const modalKeywords = document.getElementById('modal-keywords');
        const modalDesc = document.getElementById('modal-desc');
        const modalCurIdx = document.getElementById('modal-current-idx');
        const modalTotIdx = document.getElementById('modal-total-idx');

        window.focus();

        document.addEventListener('keydown', (e) => {
            const key = e.keyCode;

            if (!isGalleryOpen) {
                // --- MODE GRID ---
                document.getElementById(`card-${currentGridIdx}`).classList.remove('focused');

                if (key === 39 && currentGridIdx < 5) currentGridIdx++; // Kanan
                else if (key === 37 && currentGridIdx > 0) currentGridIdx--; // Kiri
                else if (key === 40 && currentGridIdx < 3) currentGridIdx += 3; // Bawah
                else if (key === 38 && currentGridIdx > 2) currentGridIdx -= 3; // Atas
                
                else if (key === 461 || key === 27 || key === 8) { window.location.hash = "#/page/portal"; } // Back
                else if (key === 13) { openGallery(currentGridIdx); } // Enter -> Buka Detail

                document.getElementById(`card-${currentGridIdx}`).classList.add('focused');

            } else {
                // --- MODE MODAL DETAIL & GALLERY ---
                const totalImages = activeRoomData.images.length;

                if (key === 39) { // Kanan -> Ganti Foto
                    currentGalleryIdx = (currentGalleryIdx + 1) % totalImages;
                    updateGalleryImage();
                } 
                else if (key === 37) { // Kiri -> Ganti Foto
                    currentGalleryIdx = (currentGalleryIdx - 1 + totalImages) % totalImages;
                    updateGalleryImage();
                }
                else if (key === 461 || key === 27 || key === 8 || key === 13) {
                    closeGallery(); // Back atau Enter -> Tutup Detail
                }
            }
        });

        function openGallery(roomIndex) {
            activeRoomData = rooms[roomIndex];
            currentGalleryIdx = 0;
            isGalleryOpen = true;
            
            modalTitle.innerText = activeRoomData.name;
            modalKeywords.innerText = activeRoomData.keywords;
            modalDesc.innerText = activeRoomData.desc;
            modalTotIdx.innerText = activeRoomData.images.length;
            
            updateGalleryImage();
            modal.classList.add('active');
        }

        function updateGalleryImage() {
            modalImg.style.opacity = 0;
            setTimeout(() => {
                modalImg.src = activeRoomData.images[currentGalleryIdx];
                modalCurIdx.innerText = currentGalleryIdx + 1;
                modalImg.style.opacity = 1;
            }, 150);
        }

        function closeGallery() {
            isGalleryOpen = false;
            modal.classList.remove('active');
        }
    </script>
</body>
</html>
