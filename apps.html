<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Portal - Ayatara Resort TV</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* STANDAR TV: HTML menutupi seluruh layar */
        html {
            width: 100vw; height: 100vh;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* STANDAR TV: Body ukuran asli 1280x720 lalu di-zoom otomatis */
        body {
            width: 1280px; height: 720px; background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; z-index: 1;
            
            /* Kaca Pembesar Layar TV */
            transform: scale(calc(100vw / 1280));
            transform-origin: center center;
            flex-shrink: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND AYATARA STYLE --- */
        .bali-bg-layer {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        
        .bg-gradient-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.98) 90%); 
            z-index: -1;
        }

        /* --- HEADER --- */
        .header-section {
            text-align: center;
            margin-bottom: 70px;
            margin-top: -40px; 
            opacity: 0; 
            animation: luxuryFade 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
        }

        .welcome-text {
            font-weight: 300;
            font-size: 38px;
            letter-spacing: 4px;
            color: #e0e0e0;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 4px;
            color: #d4af37;
            opacity: 0.8;
            margin: 0;
        }

        /* --- LAYOUT APLIKASI (SERENE MINIMALISM) --- */
        .app-container {
            display: flex;
            gap: 50px;
            z-index: 2;
        }

        .app-card {
            position: relative;
            width: 260px;
            height: 160px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
            outline: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            
            opacity: 0;
            animation: luxuryCardLoad 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            will-change: transform, opacity;
        }

        .app-card:nth-child(1) { animation-delay: 0.5s; }
        .app-card:nth-child(2) { animation-delay: 0.7s; }
        .app-card:nth-child(3) { animation-delay: 0.9s; }

        /* Styling Image Eksternal (DIUBAH: Menggunakan Opacity) */
        .app-card img {
            width: 140px;
            max-height: 55px; 
            object-fit: contain;
            transition: all 0.4s ease;
            
            /* Logo diredupkan saat layar diam agar terkesan elegan, 
               serta MENCEGAH BUG RENDER PUTIH saat di-capture */
            opacity: 0.35; 
            filter: none; 
        }

        .app-label {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 600;
            color: #d4af37;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        /* --- STATE FOKUS (REMOTE TV) --- */
        .app-card.focused {
            transform: translateY(-15px) scale(1.08);
            background: rgba(255, 255, 255, 0.08);
            border-color: #d4af37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 
                        0 0 30px rgba(212, 175, 55, 0.3);
            z-index: 10;
        }

        /* Saat disorot, kembalikan logo ke warna terang 100% */
        .app-card.focused img {
            opacity: 1;
            transform: translateY(-10px) scale(1.1);
        }

        .app-card.focused .app-label {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes luxuryFade { 
            0% { opacity: 0; transform: translateY(20px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }
        @keyframes luxuryCardLoad { 
            0% { opacity: 0; transform: translateY(40px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
    </style>
</head>
<body>

    <div class="bali-bg-layer"></div>
    <div class="bg-gradient-overlay"></div>

    <div class="header-section">
        <h1 class="welcome-text">In-Room Entertainment</h1>
        <p class="subtitle">SELECT YOUR STREAMING EXPERIENCE</p>
    </div>

    <div class="app-container">
        <div class="app-card focused" id="app-0">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube Official">
            <span class="app-label">YOUTUBE</span>
        </div>

        <div class="app-card" id="app-1">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Official">
            <span class="app-label">NETFLIX</span>
        </div>

        <div class="app-card" id="app-2">
            <img src="asset/Logo_Vidio.png" alt="Vidio Official">
            <span class="app-label">VIDIO</span>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. KAMUS APP ID (NATIVE SYSTEM IDENTIFIER)
        // ==========================================
        const APP_IDS = {
            YOUTUBE: "youtube.leanback.v4", 
            NETFLIX: "netflix",             
            VIDIO: "vidio.app.tv" 
        };

        // ==========================================
        // 2. FUNGSI EKSEKUSI API TV
        // ==========================================
        let isLaunching = false;

        function launchNativeApp(appId) {
            if(isLaunching) return; // Cegah spam klik remote
            isLaunching = true;
            
            // Visual Feedback: Menggelapkan layar sebagai tanda loading
            document.body.style.opacity = "0.2";
            document.body.style.transition = "opacity 0.5s ease";

            if (typeof webOS !== 'undefined' && webOS.app) {
                webOS.app.launch({
                    id: appId,
                    success: function() { setTimeout(() => { isLaunching = false; document.body.style.opacity = "1"; }, 3000); },
                    failure: function(err) { alert("Gagal membuka aplikasi."); isLaunching = false; document.body.style.opacity = "1"; }
                });
            } else if (typeof hcap !== 'undefined') {
                hcap.application.launchApplication({
                    "id": appId,
                    "onSuccess": function() { setTimeout(() => { isLaunching = false; document.body.style.opacity = "1"; }, 3000); },
                    "onFailure": function(err) { alert("HCAP Gagal."); isLaunching = false; document.body.style.opacity = "1"; }
                });
            } else {
                alert("Simulasi PC: Membuka aplikasi " + appId);
                isLaunching = false; 
                document.body.style.opacity = "1";
            }
        }

        // ==========================================
        // 3. LOGIKA NAVIGASI REMOTE
        // ==========================================
        let currentAppIdx = 0;
        const totalApps = 3;
        window.focus();

        document.addEventListener('keydown', (e) => {
            if(isLaunching) return; // Bekukan navigasi jika sedang membuka aplikasi

            const key = e.keyCode || e.which;

            document.getElementById(`app-${currentAppIdx}`).classList.remove('focused');

            if (key === 39) { // Kanan
                currentAppIdx = (currentAppIdx + 1) % totalApps;
            } else if (key === 37) { // Kiri
                currentAppIdx = (currentAppIdx - 1 + totalApps) % totalApps;
            } else if (key === 13) { // Enter / OK
                
                if (currentAppIdx === 0) launchNativeApp(APP_IDS.YOUTUBE);
                else if (currentAppIdx === 1) launchNativeApp(APP_IDS.NETFLIX);
                else if (currentAppIdx === 2) launchNativeApp(APP_IDS.VIDIO);
                
            } else if (key === 461 || key === 27 || key === 8) { // Back 
                window.location.hash = "#/page/portal";
            }

            document.getElementById(`app-${currentAppIdx}`).classList.add('focused');
        });
    </script>
</body>
</html>
