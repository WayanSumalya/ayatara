<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dining Menu - Ayatara Resort TV</title>
    <style>
        /* Mengunci resolusi dan reset standar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* --- BACKGROUND MOTION: UKIRAN BALI --- */
        .bali-bg-layer {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: slowPan 60s linear infinite;
        }

        .bg-gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(5,5,5,0.2) 0%, rgba(5,5,5,0.95) 80%);
            z-index: -1;
        }

        @keyframes slowPan {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- TYPOGRAPHY --- */
        .header-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .category-title {
            font-size: 20px;
            color: #d4af37; 
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 15px;
            opacity: 0;
            animation: fadeUp 2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards;
        }

        .main-title {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeUp 2.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.8s forwards;
        }

        /* --- CARDS LAYOUT --- */
        .cards-wrapper {
            display: flex;
            gap: 50px; 
        }

        .dining-card {
            width: 480px;
            height: 320px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.8s ease, border 0.8s ease;
            border: 2px solid transparent;
        }

        .card-1 { animation: fadeUpCard 2s cubic-bezier(0.25, 1, 0.5, 1) 1.2s forwards; }
        .card-2 { animation: fadeUpCard 2s cubic-bezier(0.25, 1, 0.5, 1) 1.6s forwards; }

        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 12s ease-out; 
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
        }

        .card-content {
            position: absolute;
            bottom: 0;
