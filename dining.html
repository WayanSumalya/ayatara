<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dining - Ayatara Resort TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px; height: 720px; background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; z-index: 1;
        }

        .bali-bg-layer {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: slowPan 60s linear infinite;
        }
        .bg-gradient-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(5,5,5,0.2) 0%, rgba(5,5,5,0.95) 80%); z-index: -1;
        }
        @keyframes slowPan { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-5%, -5%) rotate(1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }

        .header-container { text-align: center; margin-bottom: 50px; }
        .category-title { font-size: 18px; color: #d4af37; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 10px; }
        .main-title { font-size: 42px; font-weight: 300; letter-spacing: 2px; }

        .content-grid {
            display: flex; justify-content: center; gap: 50px; width: 1000px;
        }

        .content-card {
            width: 400px; height: 260px; position: relative; border-radius: 8px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 2px solid transparent;
            transition: transform 0.4s ease, box-shadow 0.4s ease, border 0.4s ease;
        }

        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0) 100%); }
        .card-content { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; text-align: center; }
        .card-content h2 { font-size: 26px; font-weight: 300; letter-spacing: 1px; color: #fff; margin-bottom: 5px; }
        .view-btn { font-size: 12px; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s ease; }

        .content-card.focused { transform: scale(1.08); border: 2px solid #d4af37; box-shadow: 0 20px 50px rgba(212, 175, 55, 0.3); z-index: 10; }
        .content-card.focused .view-btn { opacity: 1; }
    </style>
</head>
<body>

    <div class="bali-bg-layer"></div>
    <div class="bg-gradient-overlay"></div>

    <div class="header-container">
        <div class="category-title">Culinary Journey</div>
        <h1 class="main-title">Taste the Extraordinary</h1>
    </div>

    <div class="content-grid">
        <div class="content-card focused" id="card-0">
            <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=800');"></div>
            <div class="card-overlay"></div>
            <div class="card-content">
                <h2>Jivara Restaurant</h2>
                <span class="view-btn">Press Enter to View Menu</span>
            </div>
        </div>

        <div class="content-card" id="card-1">
            <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=800');"></div>
            <div class="card-overlay"></div>
            <div class="card-content">
                <h2>Saraya Bar</h2>
                <span class="view-btn">Press Enter to View Menu</span>
            </div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        window.focus();

        document.addEventListener('keydown', (e) => {
            const key = e.keyCode;

            document.getElementById(`card-${currentIdx}`).classList.remove('focused');

            if (key === 39 && currentIdx === 0) currentIdx = 1; // Kanan ke Saraya
            else if (key === 37 && currentIdx === 1) currentIdx = 0; // Kiri ke Jivara
            else if (key === 461 || key === 27 || key === 8) window.location.hash = "#/page/portal"; 
            
            // Masuk ke Sub-Page
            else if (key === 13) {
                if (currentIdx === 0) {
                    // Jika Jivara dipilih, arahkan ke file/page jivara detail
                    window.location.href = "jivara-detail.html"; // Sesuaikan URL dengan Pro:Centric Anda
                } else {
                    // Jika Saraya dipilih
                    window.location.href = "saraya-detail.html"; 
                }
            }

            document.getElementById(`card-${currentIdx}`).classList.add('focused');
        });
    </script>
</body>
</html>
