<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>Ayatara Resort Portal</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 1280px; height: 720px;
            background-color: #111;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Slider Background */
        #slider-container {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            z-index: 1;
        }
        .slide {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 2s ease-in-out;
        }
        .slide.active { opacity: 1; }
        
        /* Overlay Gradient untuk kemewahan dan teks lebih terbaca */
        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 2;
        }

        /* Canvas untuk Gold Dust */
        #gold-dust {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3; pointer-events: none;
        }

        /* Informasi Dinamis */
        .dynamic-info {
            position: absolute; top: 50%; left: 80px;
            transform: translateY(-50%);
            z-index: 4; color: #fff;
        }
        .dynamic-info h1 {
            font-size: 56px; margin: 0; color: #D4AF37; /* Gold Accent */
            text-transform: uppercase; letter-spacing: 4px;
        }
        .dynamic-info p {
            font-size: 24px; font-weight: 300; max-width: 500px;
            line-height: 1.5; text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="slider-container">
        <div class="slide active" style="background-image: url('https://source.unsplash.com/1280x720/?luxury,resort');"></div>
        <div class="slide" style="background-image: url('https://source.unsplash.com/1280x720/?villa,pool');"></div>
    </div>

    <div class="overlay"></div>
    <canvas id="gold-dust"></canvas>

    <div class="dynamic-info">
        <h1>Welcome to Ayatara</h1>
        <p id="guest-message">Experience unparalleled luxury and tranquility.</p>
    </div>

    <script>
        // --- 1. SLIDER LOGIC ---
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 6000); // Ganti gambar tiap 6 detik

        // --- 2. GOLD DUST MOTION EFFECT ---
        const canvas = document.getElementById('gold-dust');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;
        
        let particles = [];
        for(let i = 0; i < 80; i++) { // Jumlah debu emas
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 0.5,
                vx: Math.random() * 0.5 - 0.25,
                vy: Math.random() * -0.5 - 0.2, // Melayang ke atas
                alpha: Math.random() * 0.6 + 0.4
            });
        }

        function drawDust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${p.alpha})`; // #D4AF37 Gold
                ctx.fill();
                p.x += p.vx; p.y += p.vy;
                // Reset jika keluar layar
                if(p.y < 0) p.y = canvas.height;
                if(p.x < 0) p.x = canvas.width;
                if(p.x > canvas.width) p.x = 0;
            });
            requestAnimationFrame(drawDust);
        }
        drawDust();
    </script>
</body>
</html>
