<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>Ayatara Resort - Premium Portal</title>
    <style>
        /* Setup Dasar Resolusi HD */
        body, html {
            margin: 0; padding: 0;
            width: 1280px; height: 720px;
            background-color: #050505;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- SLIDER DENGAN EFEK CINEMATIC (KEN BURNS) --- */
        #slider-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .slide {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1);
            /* Transisi opacity 2 detik, transisi zoom lambat 8 detik */
            transition: opacity 2s ease-in-out, transform 8s linear; 
        }
        .slide.active {
            opacity: 1;
            transform: scale(1.08); /* Gambar membesar perlahan saat aktif memberikan kesan 'hidup' */
        }

        /* --- OVERLAY GRADIENT --- */
        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(15,15,15,0.95) 0%, rgba(15,15,15,0.6) 40%, rgba(15,15,15,0) 100%);
            z-index: 2;
        }

        /* --- CANVAS DEBU EMAS --- */
        #gold-dust {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none; 
            /* Efek glow tambahan untuk partikel */
            filter: drop-shadow(0px 0px 4px rgba(212, 175, 55, 0.8)); 
        }

        /* --- TEKS INFORMASI --- */
        .content-area {
            position: absolute; top: 50%; left: 80px;
            transform: translateY(-50%);
            z-index: 4; color: #fff;
            max-width: 550px;
        }
        .content-area h1 {
            font-size: 60px; margin: 0 0 15px 0;
            color: #D4AF37; 
            text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 2px 2px 15px rgba(0,0,0,1);
            font-weight: 300;
        }
        .content-area p {
            font-size: 22px; line-height: 1.6;
            color: #e0e0e0; margin: 0;
            text-shadow: 1px 1px 8px rgba(0,0,0,1);
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="slider-bg">
        <div class="slide active" style="background-image: url('asset/promo-pool.jpg');"></div>
        <div class="slide" style="background-image: url('asset/promo-dining.jpg');"></div>
        <div class="slide" style="background-image: url('asset/promo-spa.jpg');"></div>
    </div>

    <div class="overlay"></div>
    <canvas id="gold-dust"></canvas>

    <div class="content-area">
        <h1>Ayatara Resort</h1>
        <p>Selamat datang di surga ketenangan. Nikmati kemewahan dan pelayanan tak terlupakan selama Anda menginap bersama kami.</p>
    </div>

    <script>
        // 1. LOGIKA SLIDER GAMBAR
        const slides = document.querySelectorAll('.slide');
        let currentSlideIndex = 0;
        
        setInterval(() => {
            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            slides[currentSlideIndex].classList.add('active');
        }, 6000); // Ganti gambar tiap 6 detik

        // 2. LOGIKA PARTIKEL DEBU EMAS (ORGANIC MOTION)
        const canvas = document.getElementById('gold-dust');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;

        const particlesArray = [];
        const numberOfParticles = 80; 

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.8; 
                this.speedY = Math.random() * -0.5 - 0.2; // Melayang ke atas
                
                // Variabel untuk pergerakan gelombang (swaying)
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.02 - 0.01;
                this.amplitude = Math.random() * 0.5;
                
                // Variabel untuk efek berkedip (twinkling)
                this.baseOpacity = Math.random() * 0.5 + 0.2;
                this.pulseSpeed = Math.random() * 0.05 + 0.01;
                this.pulseAngle = Math.random() * Math.PI * 2;
            }
            update() {
                // Pergerakan vertikal
                this.y += this.speedY;
                
                // Pergerakan horizontal bergelombang (Swaying)
                this.angle += this.spin;
                this.x += Math.sin(this.angle) * this.amplitude;
                
                // Efek berkedip (Twinkling opacity)
                this.pulseAngle += this.pulseSpeed;
                this.currentOpacity = this.baseOpacity + Math.sin(this.pulseAngle) * 0.3;
                if(this.currentOpacity < 0) this.currentOpacity = 0.1;
                if(this.currentOpacity > 1) this.currentOpacity = 1;

                // Reset partikel jika keluar layar
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(212, 175, 55, ${this.currentOpacity})`; 
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Particle());
        }

        function animateDust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateDust);
        }
        animateDust();
    </script>
</body>
</html>
