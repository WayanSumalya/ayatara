<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>Ayatara Resort - Welcome Portal</title>
    <style>
        /* Reset & Setup Resolusi TV */
        body, html {
            margin: 0; padding: 0;
            width: 1280px; height: 720px;
            background-color: #050505;
            overflow: hidden; /* Mencegah scrollbar */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- SLIDER BACKGROUND --- */
        #slider-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .slide {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out; /* Efek fade 2 detik */
        }
        .slide.active {
            opacity: 1;
        }

        /* --- OVERLAY GRADIENT --- */
        /* Gelap di kiri untuk teks, transparan di kanan untuk menu Pro:Centric */
        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.4) 45%, rgba(10,10,10,0) 100%);
            z-index: 2;
        }

        /* --- CANVAS DEBU EMAS --- */
        #gold-dust {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none; /* Agar tidak mengganggu klik remote */
        }

        /* --- TEKS INFORMASI --- */
        .content-area {
            position: absolute; top: 50%; left: 80px;
            transform: translateY(-50%);
            z-index: 4; color: #fff;
            max-width: 550px;
        }
        .content-area h1 {
            font-size: 60px; margin: 0 0 15px 0;
            color: #D4AF37; /* Warna Emas Ayatara */
            text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            font-weight: 300;
        }
        .content-area p {
            font-size: 22px; line-height: 1.6;
            color: #e0e0e0; margin: 0;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.9);
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="slider-bg">
        <div class="slide active" style="background-image: url('foto1.jpg');"></div>
        <div class="slide" style="background-image: url('foto2.jpg');"></div>
        <div class="slide" style="background-image: url('foto3.jpg');"></div>
    </div>

    <div class="overlay"></div>
    <canvas id="gold-dust"></canvas>

    <div class="content-area">
        <h1>Ayatara Resort</h1>
        <p>Selamat datang di surga ketenangan. Nikmati kemewahan dan pelayanan tak terlupakan selama Anda menginap bersama kami.</p>
    </div>

    <script>
        // 1. LOGIKA SLIDER GAMBAR
        const slides = document.querySelectorAll('.slide');
        let currentSlideIndex = 0;
        
        // Ganti gambar setiap 6 detik (6000 ms)
        setInterval(() => {
            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            slides[currentSlideIndex].classList.add('active');
        }, 6000);

        // 2. LOGIKA PARTIKEL DEBU EMAS (GOLD DUST)
        const canvas = document.getElementById('gold-dust');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;

        const particlesArray = [];
        const numberOfParticles = 70; // Sesuaikan jumlah debu (jangan terlalu banyak agar TV tidak berat)

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5; // Ukuran bervariasi
                this.speedX = Math.random() * 0.4 - 0.2; // Bergerak ke kiri/kanan sedikit
                this.speedY = Math.random() * -0.6 - 0.2; // Melayang pelan ke atas
                this.opacity = Math.random() * 0.6 + 0.2; // Transparansi bervariasi
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // Jika debu keluar dari atas layar, munculkan lagi dari bawah
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`; // Warna debu emas
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Buat partikel pertama kali
        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Particle());
        }

        // Animasi Loop Partikel
        function animateDust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateDust);
        }
        animateDust();
    </script>
</body>
</html>
