<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome Letter - Resort TV</title>
    
    <link rel="preload" href="https://wayansumalya.github.io/ayatara/asset/yoga.mp4" as="video" type="video/mp4">
    <link rel="preload" href="https://wayansumalya.github.io/ayatara/asset/spa.mp4" as="video" type="video/mp4">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* OPTIMASI 3: Gunakan Viewport Width/Height agar dinamis di layar 1080p/4K */
            width: 100vw;
            height: 100vh;
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden; 
            display: flex;
            
            /* OPTIMASI 4: Magic Code untuk menghilangkan teks pecah di TV */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* -------------------------------------------
           AREA KIRI: WELCOME LETTER (Lebar 2/3)
        ------------------------------------------- */
        .welcome-section {
            width: 66.66%; 
            height: 100%;
            padding: 80px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);
            position: relative;
            z-index: 2;
            box-shadow: 15px 0 30px rgba(0,0,0,0.9); /* Sedikit ditipiskan agar ringan di GPU */
        }

        .hotel-brand {
            font-size: 28px;
            font-weight: bold;
            color: #d4af37; 
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 52px;
            font-weight: 300;
            margin-bottom: 25px;
        }

        .guest-name {
            font-weight: bold;
            color: #d4af37;
        }

        p.message {
            font-size: 24px;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 50px;
            max-width: 90%;
        }

        .instruction {
            font-size: 20px;
            color: #888888;
            border-top: 1px solid #333;
            padding-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .fade-in {
            animation: fadeIn 1.5s ease-out forwards; /* Dipercepat sedikit agar terasa responsif */
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* -------------------------------------------
           AREA KANAN: VIDEO BACKGROUND (Lebar 1/3)
        ------------------------------------------- */
        .video-section {
            width: 33.34%; 
            height: 100%;
            position: relative;
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #050505 0%, rgba(0,0,0,0) 20%);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="welcome-section">
        <div class="fade-in">
            <div class="hotel-brand">AYATARA RESORT UBUD</div>
            <h1>Welcome, <span class="guest-name">John Doe</span></h1>
            <p class="message">
                Kami sangat senang menyambut Anda. Nikmati kenyamanan fasilitas kelas dunia dan layanan tanpa batas selama Anda menginap bersama kami. 
            </p>
            <div class="instruction">
                <span>Press <strong>OK</strong> on the remote to continue.</span>
            </div>
        </div>
    </div>

    <div class="video-section">
        <div class="video-overlay"></div>
        <video id="resort-video" autoplay muted playsinline preload="auto" src="https://wayansumalya.github.io/ayatara/asset/yoga.mp4"></video>
    </div>

<script>
    const bgVideo = document.getElementById('resort-video');
    
    const playlist = [
        "https://wayansumalya.github.io/ayatara/asset/yoga.mp4",
        "https://wayansumalya.github.io/ayatara/asset/spa.mp4",
        "https://wayansumalya.github.io/ayatara/asset/canangsari.mp4",
        "https://wayansumalya.github.io/ayatara/asset/bg_resort.mp4"
    ];
    
    let currentVideoIndex = 0;

    bgVideo.addEventListener('ended', function() {
        bgVideo.style.opacity = 0;

        setTimeout(() => {
            currentVideoIndex++;
            if (currentVideoIndex >= playlist.length) {
                currentVideoIndex = 0;
            }
            
            bgVideo.src = playlist[currentVideoIndex];
            bgVideo.play();
            bgVideo.style.opacity = 1;
        }, 300); 
        
    }, false);
</script>
</body>
</html>
