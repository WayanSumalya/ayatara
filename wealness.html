<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayatara Resort - UI Asset Generator</title>
    <style>
        /* Resolusi Standar Smart TV */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* --- BACKGROUND LAYER --- */
        .bali-bg-layer {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: slowPan 60s linear infinite;
        }
        .bg-gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(5,5,5,0.2) 0%, rgba(5,5,5,0.95) 80%);
            z-index: -1;
        }

        @keyframes slowPan {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- TYPOGRAPHY HEADER --- */
        .header-container {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }
        .category-title {
            font-size: 20px; color: #d4af37; letter-spacing: 6px; text-transform: uppercase;
            margin-bottom: 15px; opacity: 0;
            animation: fadeUp 2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards;
        }
        .main-title {
            font-size: 48px; font-weight: 300; letter-spacing: 2px; opacity: 0;
            animation: fadeUp 2.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.8s forwards;
        }

        /* --- CARDS LAYOUT (ASSET GENERATOR) --- */
        .cards-wrapper {
            display: flex; gap: 20px; justify-content: center; width: 100%;
        }

        /* Master Frame untuk diekstrak (520x360) */
        .master-frame {
            width: 520px; height: 360px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; 
        }

        .content-card {
            width: 480px; height: 320px;
            position: relative; border-radius: 12px; overflow: hidden; opacity: 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 2px solid transparent;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, border 0.4s ease;
        }

        .card-1 { animation: fadeUpCard 2s cubic-bezier(0.25, 1, 0.5, 1) 1.2s forwards; }
        .card-2 { animation: fadeUpCard 2s cubic-bezier(0.25, 1, 0.5, 1) 1.6s forwards; }

        .card-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: transform 12s ease-out; 
        }

        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
        }

        .card-content {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 35px;
            transform: translateY(25px); opacity: 0;
            animation: fadeUpText 1.8s cubic-bezier(0.25, 1, 0.5, 1) 2.2s forwards;
        }
        .card-content h2 { font-size: 34px; font-weight: 300; margin-bottom: 8px; letter-spacing: 1px; }
        .card-content p { font-size: 18px; color: #b3b3b3; margin-bottom: 20px; font-weight: 300; }
        .badge {
            display: inline-block; padding: 6px 15px; border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37; font-size: 14px; border-radius: 4px; letter-spacing: 2px;
            transition: border 0.4s ease; text-transform: uppercase;
        }

        /* --- STATE FOKUS (TARGET EKSTRAKSI FOTO) --- */
        .content-card.focused {
            transform: scale(1.04); 
            border: 2px solid #d4af37; 
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.25); 
        }
        .content-card.focused .card-bg { transform: scale(1.08); }
        .content-card.focused .badge { border: 1px solid #d4af37; background: rgba(212, 175, 55, 0.1); }

        /* --- KEYFRAMES --- */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUpCard { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUpText { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bali-bg-layer"></div>
    <div class="bg-gradient-overlay"></div>

    <div class="header-container">
        <div class="category-title" id="page-subtitle">Wellness & Relaxation</div>
        <h1 class="main-title" id="page-title">Rejuvenate Your Soul</h1>
    </div>

    <div class="cards-wrapper">
        <div class="master-frame">
            <div class="content-card card-1" id="menu-1">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=800&auto=format&fit=crop');"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2>Ayatara Spa</h2>
                    <p>Traditional Balinese healing therapies.</p>
                    <span class="badge">09:00 - 21:00</span>
                </div>
            </div>
        </div>

        <div class="master-frame">
            <div class="content-card card-2" id="menu-2">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1593811167562-9cef47bfc4d7?q=80&w=800&auto=format&fit=crop');"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2>Yoga Pavilion</h2>
                    <p>Find inner peace amidst the Ubud jungle.</p>
                    <span class="badge">Schedule Inside</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            document.querySelectorAll('.content-card').forEach(card => card.classList.remove('focused'));
            if (e.key === '1') document.getElementById('menu-1').classList.add('focused');
            if (e.key === '2') document.getElementById('menu-2').classList.add('focused');
        });
    </script>

</body>
</html>
